<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <!-- No background rect — fully transparent -->

  <!-- CX monogram -->
  <text x="10" y="130" font-family="monospace" font-size="100px" font-weight="500" fill="#00c896" letter-spacing="-4">CX</text>

  <!-- Slash divider -->
  <line x1="158" y1="28" x2="174" y2="138" stroke="#00c896" stroke-width="2" opacity="0.4"/>

  <!-- CRYPTRIX wordmark -->
  <text x="185" y="110" font-family="sans-serif" font-size="42px" font-weight="500" fill="#ffffff" letter-spacing="-0.5">CRYPT<tspan fill="#00c896">RIX</tspan></text>

  <!-- Tagline -->
  <text x="185" y="135" font-family="sans-serif" font-size="9px" font-weight="400" fill="#666666" letter-spacing="2.5">Real-time crypto analytics</text>
</svg>
